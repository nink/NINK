<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — NINK</title>
  <meta name="description" content="Contact Nink Inc.">
  <link rel="stylesheet" href="style.css?v=company-v2">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">nink<span>♥</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/dealcheck">DealCheck</a>
      <a href="/contact" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="section contact-page">
      <div class="section-inner contact-inner">
        <h1>Contact us</h1>
        <p class="section-lead">Questions about NINK, DealCheck, partnerships, or press? Send us a message.</p>
        <form id="contact-form" class="contact-form" novalidate>
          <div class="field-row">
            <label>
              First name
              <input type="text" name="first_name" autocomplete="given-name" required maxlength="80">
            </label>
            <label>
              Last name
              <input type="text" name="last_name" autocomplete="family-name" required maxlength="80">
            </label>
          </div>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required maxlength="254">
          </label>
          <label>
            Subject
            <input type="text" name="subject" required maxlength="120">
          </label>
          <label>
            Message
            <textarea name="message" rows="6" required maxlength="4000"></textarea>
          </label>
          <button class="button primary" type="submit">Send message</button>
        </form>
        <p id="contact-status" class="waitlist-status" hidden role="status"></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-nav">
      <a href="/">Home</a>
      <a href="/dealcheck">DealCheck</a>
      <a href="/contact">Contact</a>
    </nav>
    <p class="copyright">© 2026 Nink Inc. All rights reserved.</p>
  </footer>

  <script src="contact.js"></script>
</body>
</html>
